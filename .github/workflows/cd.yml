name: CD – Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      target_env:
        description: Target environment
        required: true
        default: production
        type: choice
        options: [production, staging]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false # never cancel an in-flight deploy

jobs:
  # ────────────────────────────────────────────────────────────────
  # Build production artefacts
  # ────────────────────────────────────────────────────────────────
  build:
    name: Production Build
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          NODE_ENV: production
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_GOOGLE_MAP_ID: ${{ secrets.VITE_GOOGLE_MAP_ID }}

      # ── Docker (Node gateway + frontend) ────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/biome-server
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push Docker image (Node gateway)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Haskell payments service ─────────────────────────────────
      - name: Build & push Docker image (Haskell payments)
        uses: docker/build-push-action@v6
        with:
          context: payments-hs
          file: payments-hs/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/biome-payments:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────
  # Deploy to staging (automatic on every main push)
  # ────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd /opt/biome-staging

            # Pull latest images
            export IMAGE_TAG=sha-${{ github.sha }}
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull

            # Record previous image tag for rollback
            PREV_TAG=$(docker inspect --format='{{index .RepoTags 0}}' biome-server 2>/dev/null || echo "")

            # Restart containers with new images
            docker compose up -d --remove-orphans

            # Wait for health; roll back to previous tag on failure
            sleep 10
            if ! curl --fail http://localhost:3000/api/health; then
              echo "Health check failed — rolling back to ${PREV_TAG}"
              if [ -n "$PREV_TAG" ]; then
                IMAGE_TAG="$PREV_TAG" docker compose up -d
              fi
              exit 1
            fi

      - name: Run smoke tests against staging
        run: |
          curl --fail ${{ vars.STAGING_URL }}/api/health
          echo "✅ Staging health check passed"

  # ────────────────────────────────────────────────────────────────
  # Deploy to production (manual approval gate)
  # ────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment:
      name: production # requires approval in GitHub Environments settings
      url: ${{ vars.PRODUCTION_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            set -e
            cd /opt/biome

            export IMAGE_TAG=sha-${{ github.sha }}
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull new images
            docker compose pull

            # Record previous image tag for rollback
            PREV_TAG=$(docker inspect --format='{{index .RepoTags 0}}' biome-server 2>/dev/null || echo "")

            # Restart containers with new images
            docker compose up -d --remove-orphans

            # Verify health; roll back to previous image on failure
            sleep 15
            if ! curl --fail http://localhost:3000/api/health; then
              echo "Health check failed — rolling back to ${PREV_TAG}"
              if [ -n "$PREV_TAG" ]; then
                IMAGE_TAG="$PREV_TAG" docker compose up -d
              fi
              exit 1
            fi

      - name: Notify deployment
        if: always()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} *Biome* deployed to *production*\nCommit: `${{ github.sha }}` by @${{ github.actor }}\n${{ vars.PRODUCTION_URL }}"
            }